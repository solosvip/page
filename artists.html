  <title>艺术家风格（图像艺术）索引 · 单文件</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #333333;
      --muted: #999999;
      --border: #eeeeee;
      --badge: #f5f5f5;
      --warn-bg: #fff3cd;
      --warn-fg: #856404;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Noto Sans SC, Arial, sans-serif;
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255, 255, 255, .6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    header h1 { margin: 0 0 8px; font-size: 18px; }
    .controls { display: grid; grid-template-columns: 1fr 260px auto; gap: 8px; align-items: center; }
    input[type="search"], select {
      width: 100%; background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    }
    label.checkbox { display: inline-flex; gap: 6px; align-items: center; color: var(--muted); }
    .count { color: var(--muted); font-size: 12px; }
    main { padding: 16px; }
    .grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    .card {
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; min-height: 100%;
    }
    .thumb {
      position: relative; width: 100%; overflow: hidden; border-radius: 8px;
      background: #f5f5f5;
      display: grid; place-items: center; color: var(--muted);
      font-size: 12px; text-align: center; padding: 8px;
    }
    .thumb img { width: 100%; height: auto; display: block; }
    .names { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .en { font-weight: 700; }
    .zh { color: var(--muted); font-size: 13px; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { background: var(--badge); color: var(--text); border-radius: 999px; padding: 2px 8px; font-size: 12px; }
    .badge.sensitive { background: var(--warn-bg); color: var(--warn-fg); }
    .style { color: var(--text); }
    .note { color: var(--muted); font-size: 12px; }
    .copy-btn {
      background: var(--badge);
      color: var(--text);
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.5;
      cursor: pointer;
      flex-shrink: 0;
    }
    .copy-btn:active {
      background: var(--border);
    }
    @media (max-width: 740px) { .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>即梦4.0可以识别的艺术家风格</h1>
    <div class="controls">
      <input id="q" type="search" placeholder="搜索：英文名/中文名/风格/分类" />
      <select id="category"><option value="">全部分类</option></select>
      <label class="checkbox"><input id="hideSensitive" type="checkbox" /> 隐藏敏感内容（裸露/黑暗）</label>
      <span id="count" class="count"></span>
    </div>
  </header>

  <main>
    <section id="grid" class="grid"></section>
  </main>

  </footer>

  <script>
    // 读取内嵌 JSON
    const DATA = JSON.parse(document.getElementById('artist-data').textContent);
    const ARTISTS = DATA.artists || [];

    // UI 元素
    const grid = document.getElementById('grid');
    const q = document.getElementById('q');
    const cat = document.getElementById('category');
    const hideSensitive = document.getElementById('hideSensitive');
    const countEl = document.getElementById('count');

    // 填充分类
    const categories = Array.from(new Set(ARTISTS.map(a => a.category))).sort();
    for (const c of categories) {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c; cat.appendChild(opt);
    }

    function createCard(a) {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.category = a.category || '';
      card.dataset.sensitive = a.sensitive ? '1' : '0';

      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      if (a.img && a.img.trim()) {
        const img = new Image();
        img.loading = 'lazy';
        img.alt = `${a.en_name} preview`;
        img.src = a.img.trim();
        img.onerror = () => { thumb.textContent = '图片加载失败，请检查链接'; };
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = '未设置图片链接<br/>请在 JSON 的 "img" 字段填写 URL';
      }

      const names = document.createElement('div');
      names.className = 'names';

      const nameWrapper = document.createElement('div');
      nameWrapper.innerHTML = `<div class="en">${a.en_name || ''}</div><div class="zh">${a.zh_name || ''}</div>`;

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = '复制';
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const textToCopy = [a.en_name, a.zh_name, a.style].filter(Boolean).join(', ');
        navigator.clipboard.writeText(textToCopy).then(() => {
          copyBtn.textContent = '已复制!';
          setTimeout(() => { copyBtn.textContent = '复制'; }, 1500);
        }).catch(err => {
          console.error('Failed to copy: ', err);
          copyBtn.textContent = '失败';
          setTimeout(() => { copyBtn.textContent = '复制'; }, 1500);
        });
      });

      names.append(nameWrapper, copyBtn);

      const meta = document.createElement('div');
      meta.className = 'meta';
      const b1 = document.createElement('span'); b1.className = 'badge'; b1.textContent = a.category || ''; meta.appendChild(b1);
      if (a.sensitive) { const b2 = document.createElement('span'); b2.className = 'badge sensitive'; b2.textContent = '敏感'; meta.appendChild(b2); }

      const style = document.createElement('div'); style.className = 'style'; style.textContent = a.style || '';
      const note = document.createElement('div'); note.className = 'note'; note.textContent = a.note || ''; if (!a.note) note.style.display = 'none';

      card.append(thumb, names, meta, style, note);
      return card;
    }

    function render(list) {
      grid.innerHTML = '';
      list.forEach(a => grid.appendChild(createCard(a)));
      const total = list.length;
      document.getElementById('count').textContent = `共 ${total} 位`;
    }

    function applyFilters() {
      const term = (q.value || '').trim().toLowerCase();
      const category = cat.value; const hide = hideSensitive.checked;
      const filtered = ARTISTS.filter(a => {
        if (category && a.category !== category) return false;
        if (hide && a.sensitive) return false;
        if (term) {
          const hay = [a.en_name, a.zh_name, a.style, a.category, a.note].join(' ').toLowerCase();
          return hay.includes(term);
        }
        return true;
      });
      render(filtered);
    }

    [q, cat, hideSensitive].forEach(el => el.addEventListener('input', applyFilters));
    render(ARTISTS);
  </script>
